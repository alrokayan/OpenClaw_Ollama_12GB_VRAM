name: generated-files

# Enforces, for everyone (a pre-commit hook only protects one clone and can be
# skipped with --no-verify): the two scripts parse and are ASCII-only, the menu
# is intact in both editions, and the generated docs (README/LICENSE/.gitignore/
# env.example) are exactly what the generator produces from the current source.
#
# The soft-test is NOT a committed .ps1 -- it lives once, embedded in CLAUDE.md.
# This job extracts that fenced block (the ```powershell block whose first line
# is "# soft-test.ps1") and runs it, so there is never a second copy to drift.

on:
  push:
  pull_request:

jobs:
  soft-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract soft-test from CLAUDE.md and run it
        shell: powershell
        run: |
          $md = Get-Content CLAUDE.md -Raw
          $m = [regex]::Match($md, "(?s)[\x60]{3}powershell\r?\n(# soft-test\.ps1.*?)\r?\n[\x60]{3}")
          if (-not $m.Success) { Write-Error "soft-test block not found in CLAUDE.md"; exit 2 }
          $t = Join-Path $env:TEMP "oc-soft-test.ps1"
          [IO.File]::WriteAllText($t, $m.Groups[1].Value, (New-Object Text.UTF8Encoding($false)))
          & $t
          exit $LASTEXITCODE
